name: Deploy server to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_REPO: ${{ secrets.ECR_REPO_SERVER }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: image
        run: |
          IMAGE_URI="${ECR_REPO}:${GITHUB_SHA}"
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=registry,ref="${ECR_REPO}:latest" \
            --cache-to type=inline \
            -t "$IMAGE_URI" \
            -t "${ECR_REPO}:latest" \
            --push .
          echo "registry=$(echo "$ECR_REPO" | cut -d'/' -f1)" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | sudo docker login --username AWS --password-stdin "${{ steps.image.outputs.registry }}"
            cd /home/ec2-user
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod pull api celery-worker celery-beat
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
            sudo docker image prune -f
