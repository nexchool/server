name: Deploy server to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_REPO: ${{ secrets.ECR_REPO_SERVER }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        id: image
        run: |
          IMAGE_URI="${ECR_REPO}:${GITHUB_SHA}"
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=registry,ref="${ECR_REPO}:latest" \
            --cache-to type=inline \
            -t "$IMAGE_URI" \
            -t "${ECR_REPO}:latest" \
            --push .
          echo "registry=$(echo "$ECR_REPO" | cut -d'/' -f1)" >> "$GITHUB_OUTPUT"

      # Deploys over SSM instead of SSH: no key secret, no open port 22. Commands
      # run as root on the instance (no sudo); the instance role provides ECR auth.
      - name: Deploy on EC2 via SSM
        env:
          # Prod instance. Update if the instance is ever replaced.
          EC2_INSTANCE_ID: i-0cfd39b4452e87ef1
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy server ${{ github.sha }}" \
            --parameters '{
              "commands": [
                "set -euo pipefail",
                "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.image.outputs.registry }}",
                "cd /home/ec2-user",
                "docker compose -f docker-compose.prod.yml --env-file .env.prod pull api celery-worker celery-beat",
                "docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans",
                "docker image prune -f || true"
              ],
              "executionTimeout": ["900"]
            }' \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"
          STATUS=Pending
          for _ in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" \
              --instance-id "$EC2_INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo Pending)
            case "$STATUS" in Success|Failed|Cancelled|TimedOut) break ;; esac
            sleep 10
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status: Status, Stdout: StandardOutputContent, Stderr: StandardErrorContent}' --output json
          test "$STATUS" = "Success"
